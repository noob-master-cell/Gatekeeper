# ──────────────────────────────────────────────────────────────
# Gatekeeper — Docker Compose (Full Stack)
# ──────────────────────────────────────────────────────────────

services:
  # ── Admin Dashboard ────────────────────────────────────────
  dashboard:
    build:
      context: ../gatekeeper-dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      proxy:
        condition: service_healthy
    networks:
      - gatekeeper

  # ── Reverse Proxy ──────────────────────────────────────────
  proxy:
    build:
      context: ../gatekeeper-proxy
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GK_BACKEND_URL=http://backend:8001
      - GK_CONTROL_PLANE_URL=http://control-plane:8002
      - GK_LOG_LEVEL=DEBUG
      - GK_DEV_MODE=false
      - GK_DEV_LOGIN_ENABLED=false
      - GK_REDIS_URL=redis://redis:6379/0
      - GK_KEYS_DIR=/tmp/gatekeeper_keys
      - GK_MTLS_ENABLED=true
      - GK_MTLS_CERT_DIR=/certs
      - GK_GOOGLE_CLIENT_ID=${GK_GOOGLE_CLIENT_ID}
      - GK_GOOGLE_CLIENT_SECRET=${GK_GOOGLE_CLIENT_SECRET}
      - GK_GOOGLE_REDIRECT_URI=${GK_GOOGLE_REDIRECT_URI}
      - GK_CP_API_KEY=${GK_CP_API_KEY:-dev-api-key-change-me}
    volumes:
      - ./certs:/certs:ro
      - ../gatekeeper-dashboard/dist:/tmp/gatekeeper/public:ro
      - proxy_keys:/tmp/gatekeeper_keys
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gatekeeper

  # ── Dummy Backend ──────────────────────────────────────────
  backend:
    build:
      context: ../gatekeeper-backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./certs:/certs:ro
    environment:
      - LOG_LEVEL=DEBUG
      - GK_MTLS_ENABLED=true
      - GK_MTLS_CERT_DIR=/certs
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request,ssl; urllib.request.urlopen('https://localhost:8001/health',context=ssl._create_unverified_context())" ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - gatekeeper

  # ── Control Plane ──────────────────────────────────────────
  control-plane:
    build:
      context: ../gatekeeper-control-plane
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./certs:/certs:ro
    environment:
      - GK_CP_DATABASE_URL=postgresql+asyncpg://gatekeeper:gatekeeper_dev@postgres:5432/gatekeeper
      - GK_CP_REDIS_URL=redis://redis:6379/0
      - GK_CP_LOG_LEVEL=DEBUG
      - GK_CP_API_KEY=${GK_CP_API_KEY:-dev-api-key-change-me}
      - GK_CP_MTLS_ENABLED=true
      - GK_CP_MTLS_CERT_DIR=/certs
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request,ssl; urllib.request.urlopen('https://localhost:8002/health',context=ssl._create_unverified_context())" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gatekeeper

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gatekeeper
      POSTGRES_PASSWORD: gatekeeper_dev
      POSTGRES_DB: gatekeeper
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gatekeeper" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gatekeeper

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - gatekeeper

volumes:
  pg_data:
  redis_data:
  proxy_keys:


networks:
  gatekeeper:
    driver: bridge
