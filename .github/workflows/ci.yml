name: CI — Gatekeeper

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────
  # Python Services (proxy, backend, control-plane)
  # ──────────────────────────────────────────
  python-lint-test:
    name: "Python — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - gatekeeper-proxy
          - gatekeeper-backend
          - gatekeeper-control-plane

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: ${{ matrix.service }}
        run: ruff check .

      - name: Format check with ruff
        working-directory: ${{ matrix.service }}
        run: ruff format --check .

      - name: Type check with mypy
        working-directory: ${{ matrix.service }}
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: python -m pytest tests/ -v --tb=short

  # ──────────────────────────────────────────
  # React Dashboard
  # ──────────────────────────────────────────
  dashboard-lint:
    name: "Dashboard — Lint & Build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: gatekeeper-dashboard
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Lint
        working-directory: gatekeeper-dashboard
        run: pnpm lint
        continue-on-error: true

      - name: Build
        working-directory: gatekeeper-dashboard
        run: pnpm build
        continue-on-error: true
