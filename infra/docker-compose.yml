# ──────────────────────────────────────────────────────────────
# Gatekeeper — Docker Compose (Full Stack)
# ──────────────────────────────────────────────────────────────

services:
  # ── Reverse Proxy ──────────────────────────────────────────
  proxy:
    build:
      context: ../gatekeeper-proxy
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GK_BACKEND_URL=http://backend:8001
      - GK_LOG_LEVEL=DEBUG
      - GK_DEV_MODE=true
      - GK_REDIS_URL=redis://redis:6379/0
      - GK_KEYS_DIR=/tmp/gatekeeper_keys
      - GK_MTLS_ENABLED=${GK_MTLS_ENABLED:-false}
      - GK_MTLS_CERT_DIR=/certs
    volumes:
      - certs:/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gatekeeper

  # ── Dummy Backend ──────────────────────────────────────────
  backend:
    build:
      context: ../gatekeeper-backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - LOG_LEVEL=DEBUG
      - GK_MTLS_ENABLED=${GK_MTLS_ENABLED:-false}
      - GK_MTLS_CERT_DIR=/certs
    volumes:
      - certs:/certs:ro
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')" ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - gatekeeper

  # ── Control Plane ──────────────────────────────────────────
  control-plane:
    build:
      context: ../gatekeeper-control-plane
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - GK_CP_DATABASE_URL=postgresql+asyncpg://gatekeeper:gatekeeper_dev@postgres:5432/gatekeeper
      - GK_CP_REDIS_URL=redis://redis:6379/0
      - GK_CP_LOG_LEVEL=DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gatekeeper

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gatekeeper
      POSTGRES_PASSWORD: gatekeeper_dev
      POSTGRES_DB: gatekeeper
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gatekeeper" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gatekeeper

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - gatekeeper

volumes:
  pg_data:
  redis_data:
  certs:


networks:
  gatekeeper:
    driver: bridge
